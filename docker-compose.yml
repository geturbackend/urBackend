
services:
  # ── MongoDB ───────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: urbackend_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:latest
    container_name: urbackend_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  # ── Backend (Node.js) ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: urbackend_api
    restart: unless-stopped
    ports:
      - '1234:1234'
    depends_on:
      - mongo
      - redis
    env_file:
      - path: .env
        required: false
    environment:
      # Override DB URLs to use Docker service names
      MONGO_URL: mongodb://mongo:27017/urbackend
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 1234

volumes:
  mongo_data:
  redis_data:
